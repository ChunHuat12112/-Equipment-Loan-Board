<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>設備借用看板 / Equipment Loan Board</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #FAF7F2;
    --surface: #FFFFFF;
    --surface-2: #F4EFE6;
    --line: #E5DFD2;
    --line-soft: #EDE8DD;
    --ink: #4A453C;
    --ink-dim: #8B8477;
    --ink-mute: #ABA495;
    --teal: #7FB69E;
    --teal-dim: #588E77;
    --amber: #E8B382;
    --amber-dim: #C08F55;
    --coral: #E0958C;
    --coral-dim: #C06B60;
    --mono: 'IBM Plex Mono', ui-monospace, monospace;
    --sans: 'IBM Plex Sans', -apple-system, sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    padding:32px 20px 60px;
    min-height:100vh;
  }
  .wrap{max-width:920px;margin:0 auto;}
  .topbar{
    display:flex;justify-content:space-between;align-items:flex-end;
    margin-bottom:28px;flex-wrap:wrap;gap:16px;
  }
  .brand-eyebrow{
    font-family:var(--mono);font-size:11px;letter-spacing:0.16em;
    color:var(--ink-mute);text-transform:uppercase;margin:0 0 6px;
  }
  h1{
    font-size:24px;font-weight:600;margin:0;letter-spacing:-0.01em;
  }
  .subtitle{color:var(--ink-dim);font-size:13px;margin-top:6px;}
  .btn{
    font-family:var(--sans);font-size:13px;font-weight:500;
    background:var(--surface-2);color:var(--ink);
    border:1px solid var(--line);border-radius:6px;
    padding:9px 16px;cursor:pointer;transition:background .12s;
  }
  .btn:hover{background:#E9E3D6;}
  .btn:active{transform:scale(0.98);}
  .btn-teal{background:var(--teal);color:#FFFFFF;border-color:var(--teal);font-weight:600;}
  .btn-teal:hover{background:var(--teal-dim);}
  .btn-out{background:var(--surface-2);color:var(--ink-mute);border-color:var(--line-soft);cursor:not-allowed;}
  .btn-out:hover{background:var(--surface-2);}
  .btn-ghost{background:transparent;border-color:var(--line-soft);color:var(--ink-dim);}
  .btn-ghost:hover{background:var(--surface-2);color:var(--ink);}
  .btn-lang{
    font-family:var(--mono);font-size:12px;font-weight:600;
    background:var(--surface-2);color:var(--ink);
    border:1px solid var(--line);border-radius:6px;
    padding:9px 12px;cursor:pointer;transition:background .12s;
  }
  .btn-lang:hover{background:#E9E3D6;}
  .btn-danger-text{background:transparent;border:none;color:var(--coral-dim);font-size:12px;padding:4px 6px;cursor:pointer;flex-shrink:0;margin-left:8px;}
  .btn-danger-text:hover{text-decoration:underline;}

  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:14px;
  }
  .card{
    background:var(--surface);border:1px solid var(--line-soft);
    border-radius:10px;overflow:hidden;position:relative;
  }
  .card-stripe{
    position:absolute;left:0;top:0;bottom:0;width:5px;
  }
  .stripe-free{background:var(--teal);}
  .stripe-partial{background:var(--amber);}
  .stripe-full{background:var(--coral);}

  .card-body{padding:16px 16px 14px 20px;}
  .card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:8px;}
  .item-name{font-size:15px;font-weight:600;margin:0;}
  .item-tag{font-family:var(--mono);font-size:11px;color:var(--ink-mute);margin-top:3px;line-height:1.5;}
  .item-category{
    display:inline-block;font-size:10.5px;color:var(--teal-dim);
    background:rgba(127,182,158,0.16);border-radius:4px;
    padding:2px 7px;margin-top:6px;letter-spacing:.02em;
  }
  .item-description{
    font-size:12.5px;color:var(--ink-dim);line-height:1.5;
    margin:0 0 10px;padding-bottom:2px;
  }
  .stock-num{font-family:var(--mono);font-size:20px;font-weight:600;text-align:right;line-height:1;}
  .stock-total{font-size:12px;color:var(--ink-mute);font-weight:400;}
  .stock-label{font-size:10px;color:var(--ink-mute);text-align:right;margin-top:3px;letter-spacing:.04em;}

  .filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;}
  .filter-chip{
    font-family:var(--sans);font-size:12.5px;background:var(--surface);
    border:1px solid var(--line-soft);border-radius:20px;color:var(--ink-dim);
    padding:6px 14px;cursor:pointer;transition:all .12s;
  }
  .filter-chip:hover{border-color:var(--line);color:var(--ink);}
  .filter-chip.active{background:var(--teal);color:#FFFFFF;border-color:var(--teal);font-weight:600;}

  .bar-track{height:4px;background:var(--surface-2);border-radius:2px;overflow:hidden;margin-bottom:12px;}
  .bar-fill{height:100%;border-radius:2px;transition:width .2s;}

  .loan-list{display:flex;flex-direction:column;gap:6px;margin-bottom:12px;}
  .loan-row{
    display:flex;justify-content:space-between;align-items:flex-start;
    background:var(--surface-2);border-radius:6px;padding:7px 10px;font-size:12.5px;
  }
  .loan-who{font-weight:500;}
  .loan-meta{color:var(--ink-mute);font-size:11px;margin-left:6px;}
  .loan-reason{color:var(--ink-dim);font-size:11.5px;margin-top:3px;}
  .empty-loans{font-size:12px;color:var(--ink-mute);padding:2px 0 4px;}

  .card-actions{display:flex;gap:8px;flex-wrap:wrap;}
  .card-actions .btn{flex:1;font-size:12.5px;padding:8px;min-width:80px;}

  .borrow-form{
    margin-top:10px;padding-top:10px;border-top:1px dashed var(--line-soft);
    display:flex;flex-direction:column;gap:8px;
  }
  input, select{
    font-family:var(--sans);font-size:13px;background:var(--surface-2);
    border:1px solid var(--line);border-radius:6px;color:var(--ink);
    padding:8px 10px;width:100%;
  }
  input:focus, select:focus{outline:none;border-color:var(--teal);}
  .form-row{display:flex;gap:8px;}
  .form-row input:last-child{width:70px;flex:none;}

  .add-card{
    border:1.5px dashed var(--line);border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    min-height:150px;cursor:pointer;color:var(--ink-mute);
    font-size:13px;transition:border-color .12s,color .12s;
  }
  .add-card:hover{border-color:var(--teal);color:var(--teal);}

  .new-item-form{
    background:var(--surface);border:1px solid var(--line-soft);border-radius:10px;
    padding:16px;display:flex;flex-direction:column;gap:8px;
  }
  .new-item-form .form-row{display:flex;gap:8px;}
  .new-item-form label{font-size:11px;color:var(--ink-mute);margin-bottom:2px;display:block;}
  .form-actions{display:flex;gap:8px;margin-top:4px;}

  .status-msg{font-size:12px;color:var(--ink-mute);margin-top:14px;text-align:center;}
  .status-msg.err{color:var(--coral-dim);}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div>
      <p class="brand-eyebrow">device loan board</p>
      <h1 id="page-title">設備借用看板</h1>
      <p class="subtitle" id="page-subtitle">看看現在可以借什麼、被誰借走了</p>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <span id="admin-badge" style="display:none;font-family:var(--mono);font-size:11px;color:var(--teal-dim);letter-spacing:.04em;"></span>
      <button class="btn-lang" id="toggle-lang">EN</button>
      <button class="btn btn-ghost" id="toggle-admin"></button>
      <button class="btn btn-teal" id="toggle-add" style="display:none;"></button>
    </div>
  </div>

  <div id="admin-login-slot" style="display:none;margin-bottom:16px;"></div>
  <div id="new-item-slot" style="display:none;margin-bottom:16px;"></div>
  <div class="filter-bar" id="filter-bar"></div>
  <div class="grid" id="grid"></div>
  <p class="status-msg" id="status"></p>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwo8kIAcnNiMKx96JSV7HAL3XxgtAoJxogd9FrAhjVKFFwmg8Lvtz2U1YwIvDeRjCsmpQ/exec';

const ALL_CATEGORY = '__ALL__';

const I18N = {
  zh: {
    title: '設備借用看板',
    subtitle: '看看現在可以借什麼、被誰借走了',
    adminMode: '管理者模式',
    adminLogin: '管理者登入',
    adminLogout: '登出管理者模式',
    addEquipment: '+ 新增設備',
    allCategory: '全部',
    unlabeled: '未分類',
    available: '可借用',
    borrow: '借用',
    cancel: '取消',
    fullyBorrowed: '已全部外借',
    edit: '編輯',
    cancelEdit: '取消編輯',
    deleteEquipment: '刪除設備',
    borrowerNamePlaceholder: '借用人姓名',
    borrowReasonPlaceholder: '借用理由（例如：出差用）',
    confirmBorrow: '確認借用',
    noCurrentLoans: '目前沒有人借用',
    returnBtn: '歸還',
    equipmentName: '設備名稱',
    totalQty: '總數量',
    category: '分類',
    description: '描述（選填，例如：藍牙、機型、規格）',
    descriptionEdit: '描述（例如：藍牙、機型、規格）',
    namePlaceholder: '例如：筆記型電腦',
    categoryPlaceholder: '例如：電腦設備',
    descPlaceholder: '例如：ThinkPad X1、支援藍牙 5.0',
    add: '新增',
    saveChanges: '儲存變更',
    enterPasscode: '輸入管理者通關密碼',
    passcodePlaceholder: '通關密碼',
    login: '登入',
    loading: '載入中…',
    loadFail: '資料讀取失敗，請確認 Apps Script 連結是否正確。',
    updated: '已更新，資料存在你的 Google 試算表（Items / Loans 分頁）。',
    actionFail: '操作失敗，請確認網路連線或 Apps Script 連結。',
    needBorrowerName: '請輸入借用人姓名。',
    qtyExceeds: '借用數量超過可借數量。',
    fullyBorrowedMsg: name => `「${name}」目前已經全部外借，請等候歸還後再試。`,
    needEquipmentName: '請輸入設備名稱。',
    minTotal: '總數量至少為 1。',
    wrongPasscode: '通關密碼不正確。',
    switchedAdmin: '已切換到管理者模式，可以新增、編輯或刪除設備。',
    confirmReturnMsg: (name, item) => `確定要歸還「${name}」借用的「${item}」嗎？`,
    confirmReturnGeneric: '確定要執行歸還嗎？'
  },
  en: {
    title: 'Equipment Loan Board',
    subtitle: "See what's available to borrow and who has it",
    adminMode: 'Admin Mode',
    adminLogin: 'Admin Login',
    adminLogout: 'Log Out of Admin Mode',
    addEquipment: '+ Add Equipment',
    allCategory: 'All',
    unlabeled: 'Uncategorized',
    available: 'Available',
    borrow: 'Borrow',
    cancel: 'Cancel',
    fullyBorrowed: 'Fully Borrowed',
    edit: 'Edit',
    cancelEdit: 'Cancel Edit',
    deleteEquipment: 'Delete',
    borrowerNamePlaceholder: "Borrower's name",
    borrowReasonPlaceholder: 'Reason (e.g. business trip)',
    confirmBorrow: 'Confirm Borrow',
    noCurrentLoans: 'Not currently borrowed',
    returnBtn: 'Return',
    equipmentName: 'Equipment Name',
    totalQty: 'Total Quantity',
    category: 'Category',
    description: 'Description (optional, e.g. Bluetooth, model, specs)',
    descriptionEdit: 'Description (e.g. Bluetooth, model, specs)',
    namePlaceholder: 'e.g. Laptop',
    categoryPlaceholder: 'e.g. Computer Equipment',
    descPlaceholder: 'e.g. ThinkPad X1, Bluetooth 5.0',
    add: 'Add',
    saveChanges: 'Save Changes',
    enterPasscode: 'Enter admin passcode',
    passcodePlaceholder: 'Passcode',
    login: 'Log In',
    loading: 'Loading…',
    loadFail: 'Failed to load data. Please check the Apps Script link.',
    updated: 'Updated. Data is stored in your Google Sheet (Items / Loans tabs).',
    actionFail: 'Action failed. Please check your connection or the Apps Script link.',
    needBorrowerName: "Please enter the borrower's name.",
    qtyExceeds: 'Requested quantity exceeds what is available.',
    fullyBorrowedMsg: name => `"${name}" is fully borrowed. Please wait until it's returned.`,
    needEquipmentName: 'Please enter an equipment name.',
    minTotal: 'Total quantity must be at least 1.',
    wrongPasscode: 'Incorrect passcode.',
    switchedAdmin: 'Switched to admin mode. You can now add, edit, or delete equipment.',
    confirmReturnMsg: (name, item) => `Confirm that "${item}" borrowed by "${name}" has been returned?`,
    confirmReturnGeneric: 'Confirm this return?'
  }
};

let lang = 'zh';
function t(key){ return I18N[lang][key]; }

let state = { items: [], loans: [] };
let loading = true;
let addFormOpen = false;
let openBorrowFor = null;
let editItemFor = null;
let isAdmin = false;
let adminLoginOpen = false;
let selectedCategory = ALL_CATEGORY;
const ADMIN_PASSCODE = '2580'; // 自行更改這組通關密碼

function uid(prefix){
  return prefix + Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

async function loadState(){
  try{
    const res = await fetch(GAS_URL, { method: 'GET' });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    state = text && text.trim() ? JSON.parse(text) : { items: [], loans: [] };
  }catch(e){
    state = { items: [], loans: [] };
    setStatus(t('loadFail'), true);
  }
  loading = false;
  render();
}

async function postAction(action, payload){
  try{
    const res = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action, payload })
    });
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const text = await res.text();
    state = JSON.parse(text);
    setStatus(t('updated'));
    return true;
  }catch(e){
    setStatus(t('actionFail'), true);
    return false;
  }
}

function setStatus(msg, isErr){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status-msg' + (isErr ? ' err' : '');
}

function borrowedQty(itemId){
  return state.loans.filter(l => l.itemId === itemId && l.status === 'borrowed').reduce((s,l)=>s+l.qty,0);
}

function fmtDate(ts){
  const d = new Date(ts);
  return (d.getMonth()+1)+'/'+d.getDate();
}

function applyStaticText(){
  document.getElementById('page-title').textContent = t('title');
  document.getElementById('page-subtitle').textContent = t('subtitle');
  document.getElementById('toggle-add').textContent = t('addEquipment');
  document.getElementById('toggle-lang').textContent = lang === 'zh' ? 'EN' : '中文';
  document.title = t('title');
  if(loading){ setStatus(t('loading')); }
  updateAdminUI();
}

function render(){
  const grid = document.getElementById('grid');
  if(loading){ grid.innerHTML=''; setStatus(t('loading')); return; }
  grid.innerHTML = '';

  renderFilterBar();
  const currentCats = [ALL_CATEGORY, ...Array.from(new Set(state.items.map(i => i.category || t('unlabeled'))))];
  if(!currentCats.includes(selectedCategory)){ selectedCategory = ALL_CATEGORY; renderFilterBar(); }
  const visibleItems = selectedCategory === ALL_CATEGORY
    ? state.items
    : state.items.filter(i => (i.category || t('unlabeled')) === selectedCategory);

  visibleItems.forEach(item=>{
    const used = borrowedQty(item.id);
    const avail = item.total - used;
    const pct = item.total > 0 ? (used/item.total)*100 : 0;
    let stripeClass = 'stripe-free', barColor = 'var(--teal)';
    if(avail === 0){ stripeClass='stripe-full'; barColor='var(--coral)'; }
    else if(used > 0){ stripeClass='stripe-partial'; barColor='var(--amber)'; }

    const card = document.createElement('div');
    card.className = 'card';

    const loans = state.loans.filter(l=>l.itemId===item.id && l.status==='borrowed');
    const loanRows = loans.length
      ? loans.map(l=>`
        <div class="loan-row">
          <span>
            <span class="loan-who">${escapeHtml(l.borrower)}</span><span class="loan-meta">x${l.qty} · ${fmtDate(l.ts)}</span>
            ${l.reason ? `<div class="loan-reason">${escapeHtml(l.reason)}</div>` : ''}
          </span>
          <button class="btn-danger-text" data-return="${l.id}">${t('returnBtn')}</button>
        </div>`).join('')
      : `<div class="empty-loans">${t('noCurrentLoans')}</div>`;

    const formOpen = openBorrowFor === item.id;
    const editOpen = editItemFor === item.id;

    card.innerHTML = `
      <div class="card-stripe ${stripeClass}"></div>
      <div class="card-body">
        <div class="card-head">
          <div>
            <p class="item-name">${escapeHtml(item.name)}</p>
            <p class="item-tag">${item.description ? escapeHtml(item.description) : '#'+item.id.slice(2,7).toUpperCase()}</p>
            <span class="item-category">${escapeHtml(item.category || t('unlabeled'))}</span>
          </div>
          <div>
            <div class="stock-num">${avail}<span class="stock-total"> / ${item.total}</span></div>
            <div class="stock-label">${t('available')}</div>
          </div>
        </div>
        <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${barColor};"></div></div>
        <div class="loan-list">${loanRows}</div>
        <div class="card-actions">
          <button class="btn ${avail<=0?'btn-out':''}" data-borrow-toggle="${item.id}">${avail<=0 ? t('fullyBorrowed') : (formOpen? t('cancel') : t('borrow'))}</button>
          ${isAdmin ? `<button class="btn btn-ghost" data-edit-toggle="${item.id}">${editOpen ? t('cancelEdit') : t('edit')}</button>` : ''}
          ${isAdmin ? `<button class="btn btn-ghost" data-delete-item="${item.id}">${t('deleteEquipment')}</button>` : ''}
        </div>
        ${formOpen ? `
        <div class="borrow-form">
          <input type="text" placeholder="${t('borrowerNamePlaceholder')}" id="borrower-name-${item.id}">
          <input type="text" placeholder="${t('borrowReasonPlaceholder')}" id="borrower-reason-${item.id}">
          <div class="form-row">
            <input type="number" min="1" max="${avail}" value="1" id="borrower-qty-${item.id}">
            <button class="btn btn-teal" data-confirm-borrow="${item.id}" style="flex:1;">${t('confirmBorrow')}</button>
          </div>
        </div>` : ''}
        ${editOpen ? `
        <div class="borrow-form">
          <label style="font-size:11px;color:var(--ink-mute);">${t('equipmentName')}</label>
          <input type="text" id="edit-name-${item.id}" value="${escapeHtml(item.name)}">
          <label style="font-size:11px;color:var(--ink-mute);">${t('category')}</label>
          <input type="text" id="edit-category-${item.id}" value="${escapeHtml(item.category || '')}">
          <label style="font-size:11px;color:var(--ink-mute);">${t('totalQty')}</label>
          <input type="number" min="1" id="edit-total-${item.id}" value="${item.total}">
          <label style="font-size:11px;color:var(--ink-mute);">${t('descriptionEdit')}</label>
          <input type="text" id="edit-description-${item.id}" placeholder="${t('descPlaceholder')}" value="${escapeHtml(item.description || '')}">
          <button class="btn btn-teal" data-save-edit="${item.id}">${t('saveChanges')}</button>
        </div>` : ''}
      </div>
    `;
    grid.appendChild(card);
  });

  if(isAdmin){
    const addCard = document.createElement('div');
    addCard.className = 'add-card';
    addCard.textContent = t('addEquipment');
    addCard.onclick = () => { toggleAddForm(true); };
    grid.appendChild(addCard);
  }

  bindCardEvents();
  updateAdminUI();
}

function renderFilterBar(){
  const bar = document.getElementById('filter-bar');
  const cats = Array.from(new Set(state.items.map(i => i.category || t('unlabeled'))));
  const all = [ALL_CATEGORY, ...cats];
  bar.innerHTML = all.map(c => `
    <button class="filter-chip ${selectedCategory===c?'active':''}" data-filter="${escapeHtml(c)}">${escapeHtml(c===ALL_CATEGORY ? t('allCategory') : c)}</button>
  `).join('');
  bar.querySelectorAll('[data-filter]').forEach(chip=>{
    chip.onclick = () => {
      selectedCategory = chip.getAttribute('data-filter');
      render();
    };
  });
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function bindCardEvents(){
  document.querySelectorAll('[data-borrow-toggle]').forEach(btn=>{
    btn.onclick = () => {
      const id = btn.getAttribute('data-borrow-toggle');
      const item = state.items.find(i=>i.id===id);
      const avail = item.total - borrowedQty(id);
      if(avail <= 0){
        setStatus(t('fullyBorrowedMsg')(item.name), true);
        return;
      }
      openBorrowFor = (openBorrowFor === id) ? null : id;
      render();
    };
  });
  document.querySelectorAll('[data-confirm-borrow]').forEach(btn=>{
    btn.onclick = async () => {
      const id = btn.getAttribute('data-confirm-borrow');
      const nameInput = document.getElementById('borrower-name-'+id);
      const reasonInput = document.getElementById('borrower-reason-'+id);
      const qtyInput = document.getElementById('borrower-qty-'+id);
      const name = nameInput.value.trim();
      const reason = reasonInput.value.trim();
      const qty = parseInt(qtyInput.value, 10);
      const item = state.items.find(i=>i.id===id);
      const avail = item.total - borrowedQty(id);
      if(!name){ setStatus(t('needBorrowerName'), true); return; }
      if(!qty || qty < 1 || qty > avail){ setStatus(t('qtyExceeds'), true); return; }
      openBorrowFor = null;
      await postAction('addLoan', { itemId:id, itemName:item.name, borrower:name, qty, reason });
      render();
    };
  });
  document.querySelectorAll('[data-return]').forEach(btn=>{
    btn.onclick = async () => {
      const id = btn.getAttribute('data-return');
      const loan = state.loans.find(l => l.id === id);
      const msg = loan ? t('confirmReturnMsg')(loan.borrower, loan.itemName) : t('confirmReturnGeneric');
      if(!window.confirm(msg)) return;
      await postAction('returnLoan', { id });
      render();
    };
  });
  document.querySelectorAll('[data-delete-item]').forEach(btn=>{
    btn.onclick = async () => {
      const id = btn.getAttribute('data-delete-item');
      await postAction('deleteItem', { id });
      render();
    };
  });
  document.querySelectorAll('[data-edit-toggle]').forEach(btn=>{
    btn.onclick = () => {
      const id = btn.getAttribute('data-edit-toggle');
      editItemFor = (editItemFor === id) ? null : id;
      render();
    };
  });
  document.querySelectorAll('[data-save-edit]').forEach(btn=>{
    btn.onclick = async () => {
      const id = btn.getAttribute('data-save-edit');
      const name = document.getElementById('edit-name-'+id).value.trim();
      const category = document.getElementById('edit-category-'+id).value.trim() || t('unlabeled');
      const total = parseInt(document.getElementById('edit-total-'+id).value, 10);
      const description = document.getElementById('edit-description-'+id).value.trim();
      if(!name){ setStatus(t('needEquipmentName'), true); return; }
      if(!total || total < 1){ setStatus(t('minTotal'), true); return; }
      editItemFor = null;
      await postAction('updateItem', { id, name, category, total, description });
      render();
    };
  });
}

function toggleAddForm(forceOpen){
  addFormOpen = (typeof forceOpen === 'boolean') ? forceOpen : !addFormOpen;
  const slot = document.getElementById('new-item-slot');
  if(!addFormOpen){ slot.style.display='none'; slot.innerHTML=''; return; }
  slot.style.display='block';
  const existingCats = Array.from(new Set(state.items.map(i => i.category || t('unlabeled'))));
  slot.innerHTML = `
    <div class="new-item-form">
      <div class="form-row">
        <div style="flex:2;">
          <label>${t('equipmentName')}</label>
          <input type="text" id="new-item-name" placeholder="${t('namePlaceholder')}">
        </div>
        <div style="flex:1;">
          <label>${t('totalQty')}</label>
          <input type="number" id="new-item-total" min="1" value="1">
        </div>
      </div>
      <div class="form-row">
        <div style="flex:1;">
          <label>${t('category')}</label>
          <input type="text" id="new-item-category" list="category-suggestions" placeholder="${t('categoryPlaceholder')}">
          <datalist id="category-suggestions">
            ${existingCats.map(c=>`<option value="${escapeHtml(c)}">`).join('')}
          </datalist>
        </div>
      </div>
      <div class="form-row">
        <div style="flex:1;">
          <label>${t('description')}</label>
          <input type="text" id="new-item-description" placeholder="${t('descPlaceholder')}">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-teal" id="confirm-add-item">${t('add')}</button>
        <button class="btn btn-ghost" id="cancel-add-item">${t('cancel')}</button>
      </div>
    </div>
  `;
  document.getElementById('confirm-add-item').onclick = async () => {
    const name = document.getElementById('new-item-name').value.trim();
    const total = parseInt(document.getElementById('new-item-total').value, 10);
    const category = document.getElementById('new-item-category').value.trim() || t('unlabeled');
    const description = document.getElementById('new-item-description').value.trim();
    if(!name){ setStatus(t('needEquipmentName'), true); return; }
    if(!total || total < 1){ setStatus(t('minTotal'), true); return; }
    toggleAddForm(false);
    await postAction('addItem', { name, total, category, description });
    render();
  };
  document.getElementById('cancel-add-item').onclick = () => toggleAddForm(false);
}

function updateAdminUI(){
  document.getElementById('admin-badge').textContent = t('adminMode');
  document.getElementById('admin-badge').style.display = isAdmin ? 'inline' : 'none';
  document.getElementById('toggle-add').style.display = isAdmin ? 'inline-block' : 'none';
  const toggleBtn = document.getElementById('toggle-admin');
  toggleBtn.textContent = isAdmin ? t('adminLogout') : t('adminLogin');
}

function toggleAdminLogin(forceOpen){
  if(isAdmin){
    isAdmin = false;
    addFormOpen = false;
    editItemFor = null;
    document.getElementById('new-item-slot').style.display = 'none';
    render();
    return;
  }
  adminLoginOpen = (typeof forceOpen === 'boolean') ? forceOpen : !adminLoginOpen;
  const slot = document.getElementById('admin-login-slot');
  if(!adminLoginOpen){ slot.style.display='none'; slot.innerHTML=''; return; }
  slot.style.display='block';
  slot.innerHTML = `
    <div class="new-item-form">
      <div class="form-row">
        <div style="flex:1;">
          <label>${t('enterPasscode')}</label>
          <input type="password" id="admin-passcode" placeholder="${t('passcodePlaceholder')}">
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-teal" id="confirm-admin-login">${t('login')}</button>
        <button class="btn btn-ghost" id="cancel-admin-login">${t('cancel')}</button>
      </div>
    </div>
  `;
  const input = document.getElementById('admin-passcode');
  input.focus();
  const submit = () => {
    if(input.value === ADMIN_PASSCODE){
      isAdmin = true;
      adminLoginOpen = false;
      slot.style.display='none'; slot.innerHTML='';
      setStatus(t('switchedAdmin'));
      render();
    } else {
      setStatus(t('wrongPasscode'), true);
    }
  };
  document.getElementById('confirm-admin-login').onclick = submit;
  input.addEventListener('keydown', e => { if(e.key==='Enter') submit(); });
  document.getElementById('cancel-admin-login').onclick = () => toggleAdminLogin(false);
}

document.getElementById('toggle-add').onclick = () => toggleAddForm();
document.getElementById('toggle-admin').onclick = () => toggleAdminLogin();
document.getElementById('toggle-lang').onclick = () => {
  lang = (lang === 'zh') ? 'en' : 'zh';
  document.documentElement.lang = (lang === 'zh') ? 'zh-Hant' : 'en';
  applyStaticText();
  render();
};

applyStaticText();
loadState();
</script>
